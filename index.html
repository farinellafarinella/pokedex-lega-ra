  <script>
    // Adattatore qrcodejs per mantenere una singola API canvas in tutta la SPA.
    const QRCodeJS = window.QRCode;
    window.QRCode = {
      toCanvas(canvas, text, options = {}) {
        const size = options.width || 256;
        const holder = document.createElement('div');
        new QRCodeJS(holder, {
          text,
          width: size,
          height: size,
          colorDark: options.color?.dark || '#111214',
          colorLight: options.color?.light || '#ffffff',
          correctLevel: QRCodeJS.CorrectLevel.M,
        });
        return new Promise((resolve, reject) => setTimeout(() => {
          const source = holder.querySelector('canvas,img');
          if (!source) return reject(new Error('QR non generato'));
          canvas.width = size;
          canvas.height = size;
          const context = canvas.getContext('2d');
          context.fillStyle = '#ffffff';
          context.fillRect(0, 0, size, size);
          context.drawImage(source, 0, 0, size, size);
          resolve(canvas);
        }, 0));
      },
    };
  </script>

  <script>
    const supabaseConfig=window.CHAMPION_SUPABASE_CONFIG;
    const supabaseClient=supabaseConfig?.url&&supabaseConfig?.publishableKey
      ? window.supabase.createClient(supabaseConfig.url,supabaseConfig.publishableKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}})
      : null;
    let authSession=null,remoteProfile=null,authReady=false,remoteDevicesLoaded=false,activeScanner=null,scannedRecipient=null,remoteRewards=[],remoteRewardsLoaded=false,remoteBadgeCodes=[],remoteBadgeCodesLoaded=false;
    const badgeNames=['Roccia','Acqua','Elettro','Erba','Veleno','Psico','Fuoco','Terra'];
    const badgeFiles=[
      ['Mroccia.png','Mroccia block.png'],
      ['Macqua.png','Macqua block.png'],
      ['Melettro.png','Melettro block.png'],
      ['Merba.png','Merba block.png'],
      ['Mveleno.png','Mveleno block.png'],
      ['Mpsico.png','Mpsico block.png'],
      ['Mfuoco.png','Mfuoco block.png'],
      ['Mterra.png','Mterra block.png']
    ];
    const gymLeaderFiles=['brock palestra.png','misty palestra.png','lt surge palestra.png','erika palestra.png','koga palestra.png','sabrina palestra.png','blaine palestra.png','giovanni palestra.png'];
    const initialGyms=[];
    const initialRocketEvents=[];
    const initialRocketPokemon=[];
    let state=JSON.parse(localStorage.getItem('champion-league')||'null')||{trainers:[],transactions:[],gyms:initialGyms,registrations:[],rocketEvents:initialRocketEvents,rocketPokemon:initialRocketPokemon,rocketPurchases:[]};
    state.trainers=[];state.transactions=[];state.gyms=[];state.registrations=state.registrations||[];state.devices=state.devices||[];state.activationAttempts=state.activationAttempts||[];state.rocketEvents=[];state.rocketPokemon=[];state.rocketPurchases=state.rocketPurchases||[];
    const me=()=>remoteProfile||trainer(state.currentTrainerId)||state.trainers[0], money=n=>'₽ '+Number(n).toLocaleString('it-IT'), trainer=id=>state.trainers.find(t=>t.id===id), ranking=()=>[...state.trainers].sort((a,b)=>b.balance-a.balance||a.name.localeCompare(b.name,'it')), save=()=>localStorage.setItem('champion-league',JSON.stringify(state));
    const navItems=[['dashboard','Home'],['gym','Palestra'],['rocket-list','Rocket'],['transactions','Movimenti'],['ranking','Classifica'],['admin','Admin']];
    function go(page,param=''){location.hash=page+(param?'/'+param:'')}
    function header(k,t,s){return `<div class="eyebrow">${k}</div><h1 class="title">${t}</h1><p class="sub">${s||''}</p>`}
    function gymLeader(g){let position=Number(g.badgeNumber)||badgeNames.findIndex(x=>x.toLowerCase()===String(g.badge||'').toLowerCase())+1,file=gymLeaderFiles[position-1];return file?`<figure class="gym-leader"><img src="./${encodeURIComponent(file)}" alt="Capopalestra ${badgeNames[position-1]||''}"><figcaption>${badgeNames[position-1]||''}</figcaption></figure>`:''}
    function gymStatus(g){let now=Date.now(),eventAt=new Date(g.date).getTime();if(eventAt<now)return {label:'Conclusa',className:'used'};if(g.open)return {label:'Iscrizioni aperte',className:'valid'};if(new Date(g.openAt).getTime()>now)return {label:'Programmata',className:'ready'};return {label:'Iscrizioni chiuse',className:'cancelled'}}
    function featuredGym(){let now=Date.now(),future=state.gyms.filter(g=>new Date(g.date).getTime()>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));return state.gyms.find(g=>g.open&&new Date(g.date).getTime()>=now)||future[0]||[...state.gyms].sort((a,b)=>new Date(b.date)-new Date(a.date))[0]}
    function badgeGrid(value){let earned=Array.isArray(value)?value:null,count=earned?earned.length:Number(value)||0;return `<div class="badges">${badgeNames.map((b,i)=>{let unlocked=earned?earned.includes(i+1):i<count,file=badgeFiles[i][unlocked?0:1];return `<div title="${b} · ${unlocked?'conquistata':'bloccata'}" class="badge ${unlocked?'on':''}"><img src="./${encodeURIComponent(file)}" alt="Medaglia ${b} ${unlocked?'conquistata':'bloccata'}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="badge-fallback" style="display:none">${unlocked?'◆':'●'}</span><small>${b}</small></div>`}).join('')}</div>`}
    function trainerCard(t,isPublic=false){let pos=ranking().findIndex(x=>x.id===t.id)+1;return `<section class="panel profile"><div class="bar"></div><div class="pad"><div class="profile-head"><div><div class="eyebrow">Scheda allenatore</div><h2>${t.name}</h2><div class="chips"><span class="chip"># ${t.code}</span><span class="chip">Iscritto il ${new Date(t.date).toLocaleDateString('it-IT')}</span></div>${isPublic?'':`<button class="btn secondary no-print" style="margin-top:12px" onclick="changeTrainerName()">Modifica nome</button>`}</div>${isPublic?'':`<div class="balance"><small>SALDO DISPONIBILE</small><b>${money(t.balance)}</b></div>`}</div><div class="rule"></div><div style="display:flex;justify-content:space-between"><b>Medaglie</b><b class="yellow">${t.badges} / 8</b></div><div style="margin-top:14px">${badgeGrid(t.badgePositions||t.badges)}</div><div class="stats"><div class="stat"><small>Posizione</small><b>${pos}° posto</b></div><div class="stat"><small>Saldo classifica</small><b>${money(t.balance)}</b></div></div>${isPublic?`<button class="btn primary no-print" style="width:100%;margin-top:18px" onclick="go('transfer','${t.id}')">Invia Pokédollari</button>`:''}</div></section>`}
    async function changeTrainerName(){let value=prompt('Nuovo Nome Allenatore',me().name);if(value===null)return;value=value.trim();if(value.length<2||value.length>60)return alert('Il nome deve contenere da 2 a 60 caratteri.');if(!confirm(`Cambiare il Nome Allenatore in “${value}”?\n\nIl Codice Allenatore ${me().code} resterà invariato.`))return;let {error}=await supabaseClient.rpc('update_my_trainer_name',{p_trainer_name:value});if(error){alert(error.message.includes('NOT_FOUND_OR_INACTIVE')?'Profilo non trovato o account non attivo.':'Modifica non riuscita. Usa solo lettere, numeri, spazi e i caratteri . _ -');return}await loadRemoteProfile();render();alert('Nome Allenatore aggiornato.')}
    function dashboard(){let gym=featuredGym(),event=state.rocketEvents.find(e=>e.active),preview=state.rocketPokemon.filter(p=>p.eventId===event?.id).slice(0,3);return header('Area personale',`Ciao, ${me().name.split(' ')[0]}.`,'I tuoi progressi e i prossimi eventi della Lega.')+`<div class="grid cols">${trainerCard(me())}<aside><section class="panel pad"><b>Azioni rapide</b><div class="actions"><button class="btn primary with-icon" onclick="go('scan')"><img class="btn-icon" src="./icon%20qr.png" alt="">Scansiona QR</button><button class="btn secondary with-icon" onclick="go('transfer')"><img class="btn-icon" src="./pokedollaro%20icon.png" alt="">Invia Pokédollari</button><button class="btn secondary with-icon" onclick="go('gym')"><img class="btn-icon" src="./gym%20icon.png" alt="">Zona Palestra</button><button class="btn secondary with-icon" onclick="go('rocket-list')"><img class="btn-icon" src="./icon%20rocket.png" alt="">Lista Rocket</button><button class="btn secondary with-icon" onclick="go('ranking')"><img class="btn-icon" src="./classifica%20icon.png" alt="">Classifica</button><button class="btn secondary with-icon" onclick="go('transactions')"><img class="btn-icon" src="./movimenti%20icon.png" alt="">Storico movimenti</button><button class="btn secondary with-icon" onclick="go('qr')"><img class="btn-icon" src="./pokeball%20icon.png" alt="">Il mio QR</button></div></section></aside></div><div class="feature-grid" style="margin-top:20px"><article class="feature"><span class="eyebrow">Prossima palestra</span><b>${gym?.name||'In programmazione'}</b><small class="muted">${gym?`${new Date(gym.date).toLocaleString('it-IT')} · ${money(gym.price)} · ${gym.minPoints} punti`:''}</small><button class="btn primary" style="width:100%;margin-top:15px" onclick="go('gym')">Scopri l'evento</button></article><article class="feature" style="grid-column:span 2"><span class="eyebrow">Prossimo Team Rocket</span><b>${event?.name||'In programmazione'}</b><small class="muted">${event?new Date(event.date).toLocaleString('it-IT'):''}</small><div class="participants" style="margin-top:12px">${preview.map(p=>`<span class="chip">${p.name} · ${money(p.price)}</span>`).join('')}</div><button class="btn primary" style="width:100%;margin-top:15px" onclick="go('rocket-list')">Visualizza Pokémon disponibili</button></article></div>`}
    function txLine(x){let incoming=x.to==='1',peer=trainer(incoming?x.from:x.to);return `<div class="tx-row"><span><b>${peer?.name||'Lega'}</b><small class="muted" style="display:block">${x.note||'Nessuna causale'} · ${new Date(x.date).toLocaleString('it-IT')}</small></span><b class="${incoming?'green':''}">${incoming?'+':'-'}${money(x.amount)}</b></div>`}
    function rankingPage(){return header('Classifica generale','La corsa al vertice','La posizione dipende dal saldo Pokédollari di ogni allenatore.')+`<section class="panel list">${ranking().map((t,i)=>`<div class="row" onclick="go('trainer','${t.code}')"><span class="rank ${i<3?'top3':''}">${i+1}</span><span><b>${t.name}</b><small class="muted" style="display:block">${t.code}</small></span><b class="yellow desktop">${t.badges}/8 medaglie</b><b>${money(t.balance)}</b></div>`).join('')}</section>`}
    function transferPage(){scannedRecipient=null;setTimeout(()=>startQrScanner('transfer'),0);return header('Scambio tramite QR','Inquadra il Pokédex','Scansiona il QR dell’altro allenatore per identificarlo. Non devi cercarlo in una lista.')+`<section class="panel pad form"><div id="qr-reader"></div><div id="scan-message" class="muted" style="margin-top:14px;text-align:center">Consenti l’accesso alla fotocamera oppure scegli un’immagine del QR.</div></section>`}
    function transferForm(recipient){return header('Destinatario identificato','Invia Pokédollari',`Il QR appartiene a ${recipient.trainer_name} · ${recipient.trainer_code}`)+`<form class="panel pad form" onsubmit="sendMoney(event)"><div class="stat"><small>Destinatario</small><b>${recipient.trainer_name}</b><span class="muted">${recipient.trainer_code}</span></div><label>Importo<input id="amount" class="field" type="number" min="1" step="1" required placeholder="0"></label><small class="muted">Disponibili: ${money(me().balance)}</small><label>Causale facoltativa<textarea id="note" class="field" maxlength="140"></textarea></label><div id="error"></div><button class="btn primary" style="width:100%;margin-top:20px">Controlla e conferma</button><button type="button" class="btn secondary" style="width:100%;margin-top:8px" onclick="go('transfer')">Scansiona un altro QR</button></form>`}
    async function sendMoney(e){e.preventDefault();let amount=Number(document.querySelector('#amount').value),note=document.querySelector('#note').value,errorBox=document.querySelector('#error');if(!scannedRecipient||!Number.isInteger(amount)||amount<=0){errorBox.innerHTML='<div class="notice">Importo non valido.</div>';return}if(amount>me().balance){errorBox.innerHTML='<div class="notice">Saldo insufficiente.</div>';return}if(!confirm(`CONFERMA FINALE\n\nMittente: ${me().name}\nDestinatario: ${scannedRecipient.trainer_name}\nImporto: ${money(amount)}\nSaldo dopo: ${money(me().balance-amount)}`))return;let button=e.submitter;button.disabled=true;let {error}=await supabaseClient.rpc('transfer_pokedollars',{p_receiver_code:scannedRecipient.trainer_code,p_amount:amount,p_description:note,p_operation_id:crypto.randomUUID()});if(error){errorBox.innerHTML='<div class="notice">Trasferimento non riuscito. Controlla saldo e destinatario.</div>';button.disabled=false;return}await loadRemoteProfile();document.querySelector('#app').innerHTML=`<section class="panel form success"><div class="big">✓</div><h2>Trasferimento completato</h2><p class="muted">Hai inviato ${money(amount)} a ${scannedRecipient.trainer_name}.</p><button class="btn primary" onclick="go('transactions')">Vedi movimenti</button></section>`}
    function transactionsPage(){let all=state.transactions.filter(x=>x.from==='1'||x.to==='1');return header('Registro personale','Storico movimenti','I Pokédollari ricevuti sono verdi, quelli inviati hanno il segno meno.')+`<section class="panel">${all.map(txLine).join('')}</section>`}
    function qrPage(){setTimeout(loadMyPokedex,0);return header('Identità digitale','Il mio QR','Controllo del Pokédex associato al tuo account.')+`<section id="my-qr-panel" class="panel pad form success"><h2>Verifica associazione…</h2></section>`}
    async function loadMyPokedex(){let {data,error}=await supabaseClient.from('pokedex_devices').select('id,status').eq('trainer_id',me().id).eq('status','activated').maybeSingle(),panel=document.querySelector('#my-qr-panel');if(!panel)return;if(error||!data){panel.innerHTML=`<div class="mark" style="margin:auto">QR</div><h2>Nessun Pokédex abbinato</h2><p class="muted">Inquadra il QR di un Pokédex disponibile per associarlo definitivamente a ${me().name}.</p><button class="btn primary" onclick="showPairScanner()">Abbina un QR</button>`;return}panel.innerHTML=`<canvas id="qr-canvas"></canvas><h2>${me().code}</h2><p class="muted">Pokédex abbinato</p><div class="form-actions no-print"><button class="btn primary" onclick="downloadQr()">Scarica PNG</button><button class="btn secondary" onclick="print()">Stampa</button></div>`;QRCode.toCanvas(document.querySelector('#qr-canvas'),location.href.split('#')[0]+'#trainer/'+me().code,{width:300})}
    function showPairScanner(){document.querySelector('#my-qr-panel').innerHTML='<h2>Inquadra il QR del Pokédex</h2><div id="qr-reader"></div><div id="scan-message" class="muted"></div>';startQrScanner('pair')}
    function extractActivationToken(value){try{let decoded=decodeURIComponent(value.trim()),match=decoded.match(/#activate\/([^/?#]+)/i);return (match?.[1]||(/^PDX-/i.test(decoded)?decoded:'')).trim().toUpperCase()}catch{return ''}}
    function scanPage(){setTimeout(()=>startQrScanner('general'),0);return header('Scanner allenatore','Scansiona QR','Inquadra un QR premio da 100 Pokédollari oppure un QR medaglia della palestra.')+`<section class="panel pad form"><div id="qr-reader"></div><div id="scan-message" class="muted" style="margin-top:14px;text-align:center">Consenti la fotocamera o scegli un’immagine dalla galleria.</div></section>`}
    function extractQrRoute(value){try{let decoded=decodeURIComponent(value.trim()),match=decoded.match(/#(claim|badge)\/([^/?#]+)/i);return match?{type:match[1].toLowerCase(),token:match[2].trim().toUpperCase()}:null}catch{return null}}
    function startQrScanner(mode){let target=document.querySelector('#qr-reader');if(!target||typeof Html5QrcodeScanner==='undefined'){if(target)target.innerHTML='<div class="notice">Scanner non disponibile. Ricarica la pagina con una connessione internet.</div>';return}if(activeScanner)activeScanner.clear().catch(()=>{});activeScanner=new Html5QrcodeScanner('qr-reader',{fps:10,qrbox:{width:230,height:230},rememberLastUsedCamera:true,supportedScanTypes:[Html5QrcodeScanType.SCAN_TYPE_CAMERA,Html5QrcodeScanType.SCAN_TYPE_FILE]},false);activeScanner.render(async text=>{if(mode==='general'){let route=extractQrRoute(text);if(!route){document.querySelector('#scan-message').textContent='QR non riconosciuto. Usa un QR premio o medaglia.';return}await activeScanner.clear().catch(()=>{});activeScanner=null;go(route.type,route.token);return}let token=extractActivationToken(text);if(!token){document.querySelector('#scan-message').textContent='Questo non è un QR Pokédex valido.';return}await activeScanner.clear().catch(()=>{});activeScanner=null;if(mode==='pair')await pairScannedPokedex(token);else await identifyScannedTrainer(token)},()=>{})}
    async function pairScannedPokedex(token){let {error}=await supabaseClient.rpc('pair_pokedex',{p_activation_token:token});if(error){document.querySelector('#my-qr-panel').innerHTML=activationMessage('Abbinamento non riuscito',error.message.includes('ALREADY_HAS')?'Hai già un Pokédex abbinato.':error.message.includes('NOT_AVAILABLE')?'Questo Pokédex è già stato assegnato.':'Il QR non è valido o non è disponibile.');return}document.querySelector('#my-qr-panel').innerHTML=activationMessage('Pokédex abbinato','Il QR è ora associato definitivamente alla tua Scheda Allenatore.');setTimeout(()=>{location.hash='qr';render()},1400)}
    async function identifyScannedTrainer(token){let {data,error}=await supabaseClient.rpc('resolve_pokedex_activation',{p_activation_token:token}),resolved=data?.[0];if(error||!resolved||resolved.device_status!=='activated'||!resolved.trainer_code){document.querySelector('#app').innerHTML=activationMessage('Allenatore non identificato','Il Pokédex deve essere già attivato e associato a un allenatore.');return}if(resolved.trainer_code===me().code){document.querySelector('#app').innerHTML=activationMessage('QR personale','Non puoi inviare Pokédollari a te stesso.');return}let profile=await supabaseClient.from('public_profiles').select('trainer_code,trainer_name').eq('trainer_code',resolved.trainer_code).maybeSingle();if(profile.error||!profile.data){document.querySelector('#app').innerHTML=activationMessage('Profilo non disponibile','Non è stato possibile caricare il destinatario.');return}scannedRecipient=profile.data;document.querySelector('#app').innerHTML=transferForm(scannedRecipient)}
    function downloadQr(){let a=document.createElement('a');a.download='qr-'+me().code+'.png';a.href=document.querySelector('#qr-canvas').toDataURL();a.click()}
    function publicTrainer(code){let t=state.trainers.find(x=>x.code===code);return t?header('Profilo pubblico verificato',t.name,'Scheda pubblica della Champion League.')+trainerCard(t,true)+`<p class="disclaimer">Saldo e storico movimenti sono dati privati.</p>`:`<h1>Allenatore non trovato</h1>`}
    function gymPage(){let g=featuredGym();if(!g)return header('Eventi mensili','Zona Palestra','Conquista nuove medaglie e partecipa alle sfide ufficiali della Lega.')+'<section class="panel pad">Nessuna palestra programmata.</section>';let regs=state.registrations.filter(r=>r.gymId===g.id&&r.status!=='refunded'&&r.status!=='cancelled'),mine=regs.find(r=>r.trainerId==='1'),available=g.max-regs.length,hasBadge=me().badges>=g.badgeNumber,eligible=me().active&&me().balance>=g.price&&me().points>=g.minPoints&&g.open&&available>0&&!mine&&!hasBadge;setTimeout(()=>{if(mine){let c=document.querySelector('#ticket-qr');if(c)QRCode.toCanvas(c,location.href.split('#')[0]+'#ticket/'+mine.code,{width:230,margin:2})}},0);return header('Eventi mensili','Zona Palestra','Conquista nuove medaglie e partecipa alle sfide ufficiali della Lega.')+`<div class="event-hero"><section class="panel pad"><span class="status ${gymStatus(g).className}">${gymStatus(g).label}</span>${gymLeader(g)}<h2 style="font-size:30px;margin-bottom:5px">${g.name}</h2><b class="yellow">${g.badge}</b><p class="sub" style="margin-top:15px">${g.description}</p><div class="event-info"><div class="stat"><small>Data e ora</small><b>${new Date(g.date).toLocaleString('it-IT')}</b></div><div class="stat"><small>Luogo</small><b>${g.location}</b></div><div class="stat"><small>Biglietto</small><b class="yellow">${money(g.price)}</b></div><div class="stat"><small>Requisito</small><b>${g.minPoints} punti</b></div><div class="stat"><small>Posti disponibili</small><b>${available} su ${g.max}</b></div><div class="stat"><small>Iscrizioni</small><b>${new Date(g.openAt).toLocaleDateString('it-IT')} — ${new Date(g.closeAt).toLocaleDateString('it-IT')}</b></div></div>${hasBadge?'<div class="notice">Possiedi già questa medaglia.</div>':''}${mine?'':`<button class="btn primary" style="width:100%;margin-top:20px" ${eligible?'':'disabled'} onclick="buyGym('${g.id}')">Acquista Biglietto Palestra</button>`}</section><aside>${mine?ticketCard(mine,g):`<section class="panel pad"><b>Prima dell'acquisto</b><p class="muted">Costo: ${money(g.price)}<br>Saldo attuale: ${money(me().balance)}<br>Saldo dopo: ${money(me().balance-g.price)}<br>Requisito: ${g.minPoints} punti</p><small class="muted">Il biglietto è personale. Presentati con il QR e rispetta le condizioni comunicate dall'organizzazione.</small></section>`}<section class="panel pad" style="margin-top:20px"><b>Allenatori iscritti</b><div class="participants" style="margin-top:12px">${regs.length?regs.map(r=>`<span class="chip">${trainer(r.trainerId)?.name}</span>`).join(''):'<span class="muted">Nessun iscritto</span>'}</div></section></aside></div><h2 style="margin-top:35px">Storico Palestre</h2><section class="panel list">${state.gyms.filter(x=>x.id!==g.id).map(x=>`<div class="row"><span class="rank">◆</span><span><b>${x.name}</b><small class="muted" style="display:block">${x.badge} · ${x.result||'Risultati in attesa'}</small></span><span class="status ${gymStatus(x).className}">${gymStatus(x).label}</span></div>`).join('')}</section>`}
    function ticketCard(r,g){return `<section class="panel pad ticket qr"><span class="status ${r.status}">${r.status==='valid'?'Iscrizione confermata':r.status}</span><h3>Biglietto Palestra</h3><canvas id="ticket-qr"></canvas><p class="ticket-code">${r.code}</p><b>${me().name} · ${me().code}</b><p class="muted">${g.name}<br>${new Date(g.date).toLocaleString('it-IT')}</p></section>`}
    function buyGym(id){let g=state.gyms.find(x=>x.id===id),regs=state.registrations.filter(r=>r.gymId===id&&r.status==='valid');if(!g||!g.open||regs.length>=g.max||me().balance<g.price||me().points<g.minPoints||state.registrations.some(r=>r.gymId===id&&r.trainerId==='1'&&r.status==='valid'))return alert('Acquisto non disponibile. Ricontrolla saldo, requisiti e posti.');if(!confirm(`${g.name}\nCosto: ${money(g.price)}\nSaldo dopo: ${money(me().balance-g.price)}\n\nConfermi l'acquisto?`))return;let code='GYM-'+Date.now().toString(36).toUpperCase();me().balance-=g.price;state.registrations.push({id:crypto.randomUUID(),gymId:id,trainerId:'1',code,status:'valid',price:g.price,date:new Date().toISOString()});state.transactions.unshift({id:crypto.randomUUID(),from:'1',to:null,amount:g.price,note:'Biglietto '+g.name,date:new Date().toISOString(),type:'gym_ticket_purchase'});save();render()}
    function rocketPage(){let event=state.rocketEvents.find(e=>e.active),pokemon=state.rocketPokemon.filter(p=>p.eventId===event?.id);return header('Evento mensile',event?.name||'Lista Rocket','Consulta i Pokémon presenti al prossimo evento Team Rocket. Non è possibile acquistarli dal sito.')+`${event?`<section class="panel pad event-banner"><div><span class="status valid">${event.status}</span><h2>${event.name}</h2><p class="muted">${new Date(event.date).toLocaleString('it-IT')}</p></div><div class="event-count"><b>${pokemon.filter(p=>p.available&&p.stock>0).length}</b><small>Pokémon disponibili</small></div></section>`:''}<section class="panel rocket-table"><div class="rocket-head"><span>Pokémon</span><span>Stato</span><span>Costo</span></div>${pokemon.map(p=>{let status=!p.available?'Non ancora disponibile':p.stock<=0?'Esaurito':'Disponibile';return `<article class="rocket-row"><b>${p.name}</b><span class="status ${status==='Disponibile'?'valid':status==='Esaurito'?'cancelled':''}">${status}</span><b class="yellow">${money(p.price)}</b></article>`}).join('')||'<div class="pad">La lista del mese non è ancora disponibile.</div>'}</section><p class="disclaimer">Lista informativa: disponibilità e assegnazione vengono gestite esclusivamente durante l’evento.</p>`}
    function admin(){return header('Controllo Lega','Dashboard amministratore','Gestisci allenatori, Pokédex e calendario eventi.')+`<div class="admin-tools"><button class="btn primary" onclick="go('admin-pokedex')">Gestisci Pokédex</button><button class="btn secondary" onclick="go('admin-rewards')">QR premio 100 ₽</button><button class="btn secondary" onclick="go('admin-badge-qrs')">QR medaglie palestra</button><button class="btn secondary" onclick="go('admin-gyms')">Gestisci palestre</button><button class="btn secondary" onclick="go('admin-tickets')">Biglietti palestra</button><button class="btn secondary" onclick="go('admin-rocket-events')">Lista Team Rocket</button></div><div class="grid admin-stats"><div class="panel"><span class="muted">Allenatori</span><b>${state.trainers.length}</b></div><div class="panel"><span class="muted">Pokédex disponibili</span><b>${state.devices.filter(d=>d.status==='available').length}</b></div><div class="panel"><span class="muted">Eventi programmati</span><b>${state.gyms.length+state.rocketEvents.length}</b></div></div><section class="panel list" style="margin-top:20px">${state.trainers.map(t=>`<div class="row"><span class="rank">${t.badges}</span><span><b>${t.name}</b><small class="muted" style="display:block">${t.code}</small></span><b class="desktop">${money(t.balance)}</b><button class="btn secondary" onclick="editTrainer('${t.id}')">Gestisci</button></div>`).join('')}</section>`}
    function adminTickets(){return header('Amministrazione','Biglietti palestra','Verifica, check-in e rimborso.')+`<section class="panel">${state.registrations.map(r=>{let g=state.gyms.find(x=>x.id===r.gymId),t=trainer(r.trainerId);return `<article class="tx-row"><span><b>${t?.name} · ${r.code}</b><small class="muted" style="display:block">${g?.name}</small></span><span><span class="status ${r.status}">${r.status}</span><br>${r.status==='valid'?`<button class="btn secondary" onclick="checkin('${r.id}')">Check-in</button><button class="btn secondary" onclick="refundTicket('${r.id}')">Rimborsa</button>`:''}</span></article>`}).join('')||'<div class="pad">Nessun biglietto</div>'}</section>`}

    function exportPokedex(){let rows=['id,token_masked,status,trainer_code,created_at,activated_at',...state.devices.map(d=>[d.id,maskToken(d.token),d.status,trainer(d.trainerId)?.code||'',d.created,d.activatedAt||''].join(','))],blob=new Blob([rows.join('\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pokedex.csv';a.click();URL.revokeObjectURL(a.href)}
    function activationPage(token){setTimeout(()=>resolveActivation(token),0);return activationMessage('Verifica Pokédex','Controllo sicuro del codice in corso…')}
    async function resolveActivation(token){let app=document.querySelector('#app'),normalized=decodeURIComponent(token||'').trim().toUpperCase(),{data,error}=await supabaseClient.rpc('resolve_pokedex_activation',{p_activation_token:normalized});if(error){app.innerHTML=activationMessage('Verifica non disponibile',error.message.includes('TOO_MANY')?'Troppi tentativi. Attendi qualche minuto.':'Riprova tra poco.');return}let result=data?.[0];if(!result){app.innerHTML=activationMessage('Codice non valido','Il QR non è riconosciuto nel database. Genera un nuovo Pokédex oppure verifica il link dall’area admin.');return}if(result.device_status==='activated'){app.innerHTML=activationMessage('Pokédex già assegnato','Questo Pokédex è già stato assegnato a un Allenatore. Stai per essere reindirizzato.');if(result.trainer_code)setTimeout(()=>go('trainer',result.trainer_code),1800);return}if(result.device_status==='disabled'){app.innerHTML=activationMessage('Pokédex disabilitato','Contatta l’organizzazione per ricevere assistenza.');return}if(result.device_status==='replaced'){app.innerHTML=activationMessage('Pokédex sostituito','Questo codice non è più utilizzabile.');return}app.innerHTML=activationForm(normalized)}
    function activationForm(token){return header('Prima scansione','Attiva il tuo Pokédex','Registrati oppure usa un account esistente, quindi scegli il Nome Allenatore.')+`<form class="panel pad form" onsubmit="activatePokedex(event,'${token}')"><label>Email<input id="activation-email" required type="email" class="field" autocomplete="email" placeholder="nome@email.it"></label><label>Password<input id="activation-password" required minlength="8" type="password" class="field" autocomplete="current-password" placeholder="Almeno 8 caratteri"></label><label>Nome Allenatore<input id="activation-name" required minlength="2" maxlength="60" class="field" placeholder="Il nome che apparirà nella Lega"></label><div class="notice" style="color:#aaa;background:#ffffff08">Se l’email esiste effettueremo il login; altrimenti creeremo un nuovo account. L’associazione sarà definitiva.</div><div id="activation-error"></div><button class="btn primary" style="width:100%;margin-top:20px">Conferma e attiva</button></form>`}
    function activationMessage(title,text){return `<section class="panel form success"><div class="mark" style="margin:auto">CL</div><h1>${title}</h1><p class="sub" style="margin:auto">${text}</p></section>`}
    async function activatePokedex(e,token){e.preventDefault();let button=e.submitter,email=document.querySelector('#activation-email').value,password=document.querySelector('#activation-password').value,name=document.querySelector('#activation-name').value.trim(),errorBox=document.querySelector('#activation-error');if(!confirm(`RIEPILOGO ATTIVAZIONE\n\nEmail: ${email}\nNome Allenatore: ${name}\nPokédex: ${maskToken(token)}\n\nConfermi l'associazione definitiva?`))return;button.disabled=true;button.textContent='Attivazione…';let session=(await supabaseClient.auth.getSession()).data.session;if(!session){let login=await supabaseClient.auth.signInWithPassword({email,password});if(login.error){let signup=await supabaseClient.auth.signUp({email,password,options:{emailRedirectTo:location.origin+location.pathname+location.hash}});if(signup.error){errorBox.innerHTML='<div class="notice">Impossibile creare l’account. Controlla email e password.</div>';button.disabled=false;button.textContent='Conferma e attiva';return}session=signup.data.session;if(!session){errorBox.innerHTML='<div class="notice">Controlla la tua email e conferma l’account, poi scansiona nuovamente il QR.</div>';button.disabled=false;button.textContent='Conferma e attiva';return}}else session=login.data.session}let {data,error}=await supabaseClient.rpc('activate_pokedex',{p_activation_token:token,p_trainer_name:name});if(error){errorBox.innerHTML=`<div class="notice">${error.message.includes('NOT_AVAILABLE')?'Questo Pokédex è già stato utilizzato.':error.message.includes('ALREADY_ASSOCIATED')?'Questo account possiede già un Pokédex.':'Attivazione non riuscita. Riprova.'}</div>`;button.disabled=false;button.textContent='Conferma e attiva';return}await initializeAuth();alert(`Attivazione completata! Codice Allenatore: ${data?.[0]?.trainer_code}`);go('dashboard')}
    function editTrainer(id){let t=trainer(id),name=prompt('Nome allenatore',t.name);if(name===null)return;let points=Number(prompt('Punti classifica',t.points)),balance=Number(prompt('Saldo Pokédollari',t.balance)),badges=Number(prompt('Medaglie (0-8)',t.badges));if(name.trim()&&points>=0&&balance>=0&&badges>=0&&badges<=8){Object.assign(t,{name:name.trim(),points,balance,badges});save();render()}}
    function authPage(){return header('Account Champion League','Accedi','Usa l’email e la password collegate al tuo Pokédex.')+`<form class="panel pad form" onsubmit="signIn(event)"><label>Email<input id="login-email" class="field" type="email" required autocomplete="email"></label><label>Password<input id="login-password" class="field" type="password" required autocomplete="current-password"></label><div id="login-error"></div><button class="btn primary" style="width:100%;margin-top:20px">Accedi</button><button type="button" class="btn secondary" style="width:100%;margin-top:8px" onclick="resetPassword()">Password dimenticata</button></form>`}
    async function signIn(e){e.preventDefault();let button=e.submitter;button.disabled=true;let {error}=await supabaseClient.auth.signInWithPassword({email:document.querySelector('#login-email').value,password:document.querySelector('#login-password').value});button.disabled=false;if(error){document.querySelector('#login-error').innerHTML=`<div class="notice">${friendlyAuthError(error)}</div>`;return}if(location.hash.startsWith('#claim/')||location.hash.startsWith('#badge/'))render();else go('dashboard')}
    async function resetPassword(){let email=document.querySelector('#login-email')?.value||prompt('Inserisci la tua email');if(!email)return;let {error}=await supabaseClient.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname+'#dashboard'});alert(error?friendlyAuthError(error):'Email di recupero inviata.')}
    function friendlyAuthError(error){if(error?.message?.includes('Invalid login'))return 'Email o password non corretti.';if(error?.message?.includes('Email not confirmed'))return 'Conferma prima il tuo indirizzo email.';return 'Accesso non riuscito. Riprova tra poco.'}
    async function loadRemoteProfile(){remoteProfile=null;if(!authSession)return;let {data,error}=await supabaseClient.from('profiles').select('id,trainer_code,trainer_name,registration_date,ranking_points,balance,role,is_active').eq('user_id',authSession.user.id).maybeSingle();if(!error&&data){let earned=await supabaseClient.from('trainer_badges').select('badges(position)').eq('trainer_id',data.id),positions=(earned.data||[]).map(x=>x.badges?.position).filter(Boolean);remoteProfile={id:data.id,code:data.trainer_code,name:data.trainer_name,date:data.registration_date,points:data.ranking_points,balance:Number(data.balance),badges:positions.length,badgePositions:positions,active:data.is_active,role:data.role}}}
    async function loadPublicTrainers(){let profiles=await supabaseClient.rpc('get_leaderboard'),earned=await supabaseClient.from('trainer_badges').select('trainer_id,badges(position)'),positionsByTrainer={};if(profiles.error){console.error('Caricamento classifica:',profiles.error);state.trainers=[];return}(earned.data||[]).forEach(x=>{let position=x.badges?.position;if(position)(positionsByTrainer[x.trainer_id]||=[]).push(position)});state.trainers=(profiles.data||[]).map(p=>({id:p.id,code:p.trainer_code,name:p.trainer_name,date:p.registration_date,points:p.ranking_points,balance:Number(p.balance),badges:(positionsByTrainer[p.id]||[]).length,badgePositions:positionsByTrainer[p.id]||[],active:p.is_active,role:'trainer'}))}
    async function loadRemoteGyms(){if(!supabaseClient)return;let {data,error}=await supabaseClient.from('gyms').select('id,name,description,event_date,event_location,ticket_price,minimum_ranking_points,maximum_participants,registration_open_at,registration_close_at,is_registration_open,badge_id,badges(name,position)').order('event_date',{ascending:true});if(error){console.error('Caricamento palestre:',error);state.gyms=[];return}state.gyms=(data||[]).map(g=>({id:g.id,name:g.name,badge:g.badges?.name||'Medaglia',badgeId:g.badge_id,description:g.description,date:g.event_date,location:g.event_location,price:Number(g.ticket_price),minPoints:g.minimum_ranking_points,max:g.maximum_participants,openAt:g.registration_open_at,closeAt:g.registration_close_at,open:g.is_registration_open,badgeNumber:g.badges?.position||0}))}
    async function loadRemoteRocket(){if(!supabaseClient)return;let [events,pokemon]=await Promise.all([supabaseClient.from('rocket_events').select('id,name,event_month,event_date,is_active').order('event_date',{ascending:false}),supabaseClient.from('rocket_pokemon').select('id,rocket_event_id,pokemon_name,price,stock_quantity,is_available').order('created_at',{ascending:true})]);if(events.error||pokemon.error){console.error('Caricamento Rocket:',events.error||pokemon.error);state.rocketEvents=[];state.rocketPokemon=[];return}state.rocketEvents=(events.data||[]).map(e=>({id:e.id,name:e.name,month:e.event_month,date:e.event_date,active:e.is_active,status:e.is_active?'Attivo':'Non attivo'}));state.rocketPokemon=(pokemon.data||[]).map(p=>({id:p.id,eventId:p.rocket_event_id,name:p.pokemon_name,price:Number(p.price),stock:p.stock_quantity,available:p.is_available}))}
    async function initializeAuth(){if(!supabaseClient){authReady=true;render();return}let {data}=await supabaseClient.auth.getSession();authSession=data.session;await Promise.all([loadRemoteProfile(),loadPublicTrainers(),loadRemoteGyms(),loadRemoteRocket()]);authReady=true;updateAuthButton();render();supabaseClient.auth.onAuthStateChange(async(_event,session)=>{authSession=session;await Promise.all([loadRemoteProfile(),loadPublicTrainers(),loadRemoteGyms(),loadRemoteRocket()]);updateAuthButton();render()})}
    function updateAuthButton(){let b=document.querySelector('#auth-button');if(!b)return;b.textContent=authSession?'Esci':'Accedi'}
    async function handleAuthButton(){if(authSession){await supabaseClient.auth.signOut();go('login')}else go('login')}
    function resetDemo(){if(confirm('Ripristinare tutti i dati demo?')){localStorage.removeItem('champion-league');location.reload()}}
    function render(){
      let hash=location.hash.slice(1)||'dashboard',[page,param]=hash.split('/');
      const requiresAdmin=page==='admin'||page.startsWith('admin-')||page==='ticket';
      const requiresAuth=['dashboard','transfer','transactions','qr','scan','claim','badge'].includes(page)||requiresAdmin;
      document.querySelector('#nav').innerHTML=navItems.map(x=>`<button class="${page===x[0]?'active':''}" onclick="go('${x[0]}')">${x[1]}</button>`).join('');
      if(!authReady){document.querySelector('#app').innerHTML='<section class="panel form success"><h2>Connessione sicura…</h2></section>';return}
      if(page==='login'||(requiresAuth&&!authSession)){document.querySelector('#app').innerHTML=authPage();return}
      if(requiresAdmin&&remoteProfile?.role!=='admin'){document.querySelector('#app').innerHTML=activationMessage('Accesso negato','Questa sezione è riservata agli amministratori autorizzati.');return}
      if(requiresAuth&&!remoteProfile){document.querySelector('#app').innerHTML=activationMessage('Pokédex non attivato','Scansiona il QR del tuo Pokédex per creare la Scheda Allenatore.');return}
      let views={dashboard,ranking:rankingPage,transfer:transferPage,transactions:transactionsPage,qr:qrPage,scan:scanPage,gym:gymPage,'rocket-list':rocketPage,admin,'admin-gyms':adminGyms,'admin-tickets':adminTickets,'admin-pokedex':adminPokedex,'admin-rewards':adminRewards,'admin-badge-qrs':adminBadgeQrs,'admin-rocket-events':adminRocketEvents};
      if(page==='activate'){document.querySelector('#app').innerHTML=activationPage(param);return}
      if(page==='claim'){document.querySelector('#app').innerHTML=claimRewardPage(param);return}
      if(page==='badge'){document.querySelector('#app').innerHTML=claimBadgePage(param);return}
      if(page==='ticket'){let r=state.registrations.find(x=>x.code===param),g=r&&state.gyms.find(x=>x.id===r.gymId);document.querySelector('#app').innerHTML=r?header('Verifica biglietto',r.code,`${trainer(r.trainerId)?.name} · ${g?.name}`)+`<section class="panel pad form" style="text-align:center"><span class="status ${r.status}">${r.status}</span><h2>${r.status==='valid'?'Biglietto valido':'Biglietto non utilizzabile'}</h2>${r.status==='valid'?`<button class="btn primary" onclick="checkin('${r.id}')">Segna come utilizzato</button>`:''}</section>`:'<h1>Biglietto non trovato</h1>';return}
      document.querySelector('#app').innerHTML=page==='trainer'?publicTrainer(param):(views[page]||dashboard)();
    }
    async function checkSupabase(){let el=document.querySelector('#supabase-status');if(!supabaseClient){el.textContent='Supabase: non configurato';return}try{let {error}=await supabaseClient.from('badges').select('id',{head:true,count:'exact'});if(error)throw error;el.textContent='Supabase: connesso';el.style.color='#48d597';setTimeout(()=>el.remove(),3500)}catch(error){el.textContent=error.code==='PGRST205'?'Supabase: schema da installare':'Supabase: connessione non riuscita';el.style.color='#ff9da3'}}
    addEventListener('hashchange',()=>{if(activeScanner){activeScanner.clear().catch(()=>{});activeScanner=null}render()});initializeAuth();checkSupabase();
  </script>
